<div class="scanlines"></div>

<!-- Top Navigation -->
<header
  class="w-full top-0 sticky z-50 bg-background/80 backdrop-blur-sm border-b border-outline/30 px-6 py-4 flex justify-between items-center"
>
  <div class="flex items-center gap-4">
    <div
      class="w-10 h-10 rounded overflow-hidden border-2 border-primary ring-1 ring-primary/20 bg-surface"
    >
      <div class="w-full h-full bg-primary/20 flex items-center justify-center">
        <svg
          class="w-6 h-6 text-primary"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
          ></path>
        </svg>
      </div>
    </div>
    <div class="flex flex-col">
      <h1
        class="font-headline font-extrabold text-xl tracking-tighter text-primary leading-none"
      >
        S2T
      </h1>
      <span
        class="text-[10px] font-label text-secondary leading-none tracking-widest"
        >Beta</span
      >
    </div>
  </div>
  <app-settings class="flex-shrink-0 relative"></app-settings>
</header>

<!-- Main Canvas -->
<main class="max-w-4xl mx-auto px-6 pt-8 pb-48 min-h-screen">
  <!-- Date Header -->
  <div class="flex justify-center mb-12">
    <span
      class="font-label text-[10px] tracking-[0.2em] text-on-surface-variant border border-outline/40 px-4 py-1.5 rounded bg-surface/30"
    >
      Session Log • Live
    </span>
  </div>

  <div class="flex flex-col gap-y-12">
    <!-- Live Transcription (Editorial Style) -->
    <div class="flex flex-col items-start w-full">
      <div
        class="w-full bg-surface border-l-4 border-primary p-6 rounded shadow-xl relative overflow-hidden transition-all duration-300"
      >
        <!-- Background glitch effect detail -->
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-primary/5 -rotate-45 translate-x-16 -translate-y-16"
        ></div>

        <h2
          class="font-headline font-black text-2xl text-primary mb-6 tracking-tight border-b border-primary/20 pb-2"
        >
          Live Transcription
        </h2>

        <div class="text-on-surface leading-relaxed font-body text-[1rem]">
          <app-transcription></app-transcription>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Bottom Command Shell -->
<footer
  class="fixed bottom-0 left-0 w-full z-50 flex flex-col md:flex-row justify-center items-center pb-12 px-6 md:px-10 pointer-events-none gap-4"
>
  <!-- Controls Container -->
  <div class="flex-1 w-full max-w-2xl pointer-events-auto mb-4 md:mb-0">
    <app-controls></app-controls>
  </div>

  <!-- Voice Activation Orb -->
  <div class="pointer-events-auto flex items-center justify-center">
    <app-recorder></app-recorder>
  </div>
</footer>
