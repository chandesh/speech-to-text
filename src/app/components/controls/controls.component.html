<div
  class="w-full bg-surface-variant border-2 border-primary rounded shadow-[0_0_20px_var(--color-primary-glow-soft)] flex items-center px-4 py-2 backdrop-blur-md"
>
  <svg
    class="w-5 h-5 text-primary mr-3 flex-shrink-0"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
    aria-hidden="true"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M17 8l4 4m0 0l-4 4m4-4H3"
    ></path>
  </svg>

  <div class="flex items-center gap-3 flex-1">
    <button
      (click)="copyText()"
      [disabled]="!canDownload()"
      class="flex items-center gap-2 px-3 py-1.5 text-xs font-label uppercase tracking-widest rounded bg-surface hover:bg-surface-variant border border-outline/30 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
      [class.text-primary]="copyFeedback()"
      [class.text-on-surface]="!copyFeedback()"
      aria-label="Copy transcription to clipboard"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"
        ></path>
      </svg>
      <span *ngIf="!copyFeedback()">Copy</span>
      <span *ngIf="copyFeedback()">Copied!</span>
    </button>

    <button
      (click)="clearText()"
      [disabled]="!canDownload()"
      class="flex items-center gap-2 px-3 py-1.5 text-xs font-label uppercase tracking-widest rounded bg-surface hover:bg-surface-variant border border-outline/30 text-on-surface transition-all disabled:opacity-40 disabled:cursor-not-allowed"
      aria-label="Clear transcription"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
        ></path>
      </svg>
      Clear
    </button>

    <button
      (click)="submitText()"
      [disabled]="!canDownload() || isSubmitting()"
      class="flex items-center gap-2 px-3 py-1.5 text-xs font-label uppercase tracking-widest rounded bg-surface hover:bg-primary text-on-surface hover:text-background border border-outline transition-all disabled:opacity-40 disabled:cursor-not-allowed ml-auto"
      aria-label="Submit transcription"
    >
      <svg
        *ngIf="!isSubmitting()"
        class="w-4 h-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"
        ></path>
      </svg>
      <svg
        *ngIf="isSubmitting()"
        class="w-4 h-4 animate-spin"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
        ></path>
      </svg>
      <span *ngIf="!isSubmitting()">Submit</span>
      <span *ngIf="isSubmitting()">Submitting...</span>
    </button>
  </div>
</div>
