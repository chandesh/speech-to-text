<button
  (click)="togglePanel()"
  class="w-10 h-10 flex items-center justify-center rounded bg-surface hover:bg-surface-variant transition-colors text-on-surface"
  aria-label="Settings"
  aria-expanded="isOpen"
>
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
    ></path>
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
    ></path>
  </svg>
</button>

<div *ngIf="isOpen" class="fixed inset-0 z-[99]" (click)="close()"></div>

<div
  *ngIf="isOpen"
  class="fixed top-20 right-6 w-72 bg-surface border-2 border-outline/30 p-6 rounded overflow-hidden shadow-2xl backdrop-blur-md z-[100]"
  role="dialog"
  aria-label="Settings"
>
  <div
    class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"
  ></div>

  <div class="flex items-center gap-2 mb-6">
    <svg
      class="w-4 h-4 text-primary"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
      ></path>
    </svg>
    <span class="font-label text-[10px] uppercase tracking-[0.2em] text-primary font-bold"
      >System_Config</span
    >
  </div>

  <div class="space-y-5">
    <div class="group">
      <label
        for="language-select"
        class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold mb-2"
      >
        Language
      </label>
      <select
        id="language-select"
        (change)="changeLanguage($any($event.target).value)"
        [value]="speechService.language"
        class="w-full px-3 py-2 text-sm bg-surface-container border border-outline/30 rounded focus:outline-none focus:border-primary transition-all text-on-surface font-body"
      >
        <option *ngFor="let lang of languages" [value]="lang.code">
          {{ lang.name }}
        </option>
      </select>
    </div>

    <div class="group">
      <span
        class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold mb-2"
      >
        Visual_Theme
      </span>
      <div class="grid grid-cols-2 gap-2" role="radiogroup" aria-label="Theme selection">
        <button
          *ngFor="let t of themes"
          (click)="setTheme(t)"
          [class]="
            speechService.theme === t
              ? 'bg-primary text-background border-primary'
              : 'bg-surface-container text-on-surface-variant border-outline/30 hover:border-primary/50'
          "
          class="px-3 py-2 text-xs font-label uppercase tracking-widest rounded border transition-all capitalize"
          [attr.aria-pressed]="speechService.theme === t"
        >
          {{ t }}
        </button>
      </div>
    </div>
  </div>
</div>
