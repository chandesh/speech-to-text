<ng-container *ngIf="speechService.displayText(); else emptyState">
  <div class="space-y-6 text-on-surface leading-relaxed font-body text-[1rem]">
    <p class="border-l-2 border-outline/30 pl-4 py-1 whitespace-pre-wrap break-words">
      <span>{{ speechService.finalText }}</span>
      <span *ngIf="speechService.interimText" class="text-on-surface-variant italic opacity-70">
        {{ speechService.interimText }}
      </span>
    </p>
  </div>
</ng-container>

<ng-template #emptyState>
  <div
    class="flex items-center gap-3 text-primary bg-surface/50 py-2 px-4 rounded border border-primary/20 animate-pulse"
  >
    <div class="flex gap-1.5">
      <div class="w-2 h-2 bg-primary rounded-sm"></div>
      <div class="w-2 h-2 bg-primary rounded-sm opacity-60"></div>
      <div class="w-2 h-2 bg-primary rounded-sm opacity-30"></div>
    </div>
    <span class="text-[10px] font-label tracking-widest uppercase font-bold"
      >Awaiting_Input...</span
    >
  </div>
</ng-template>
