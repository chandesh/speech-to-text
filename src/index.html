<!doctype html>
<html class="theme-gruvbox" lang="en">
  <head>
    <meta charset="utf-8" />
    <title>V2T Beta</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Convert speech to text in real-time using your browser" />
    <meta name="theme-color" content="#fb4934" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#1d2021',
              surface: '#282828',
              'surface-container': '#3c3836',
              primary: '#fb4934',
              secondary: '#fabd2f',
              tertiary: '#8ec07c',
              'on-background': '#ebdbb2',
              'on-surface': '#ebdbb2',
              'on-surface-variant': '#a89984',
              outline: '#665c54',
              'primary-container': '#cc241d',
              'on-primary-container': '#fbf1c7',
              'secondary-container': '#d79921',
              'on-secondary-container': '#282828',
              'surface-variant': '#504945',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            fontFamily: {
              headline: ['Manrope', 'sans-serif'],
              body: ['JetBrains Mono', 'monospace'],
              label: ['JetBrains Mono', 'monospace'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background font-body text-on-surface selection:bg-primary/30">
    <app-root></app-root>
    <noscript>
      <p style="text-align: center; padding: 2rem">
        This application requires JavaScript to function. Please enable JavaScript in your browser
        settings.
      </p>
    </noscript>
  </body>
</html>
