services:
  speech-to-text:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: speech-to-text
    ports:
      - "4200:80"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - speech-to-text-net

  speech-to-text-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: speech-to-text-dev
    ports:
      - "4201:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NG_CLI_ANALYTICS=false
    command: npm run start -- --host 0.0.0.0 --poll 2000
    restart: unless-stopped
    networks:
      - speech-to-text-net

networks:
  speech-to-text-net:
    driver: bridge
